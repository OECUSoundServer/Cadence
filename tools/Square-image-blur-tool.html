<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>16:9 → 1:1 ぼかし背景ツール</title>
  <style>
    :root {
      --bg: #111318;
      --panel: #1a1f29;
      --panel-2: #232a36;
      --text: #f5f7fb;
      --muted: #b8c0cf;
      --accent: #7aa2ff;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 18px 40px rgba(0,0,0,0.35);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(122,162,255,0.18), transparent 35%),
        linear-gradient(180deg, #0d1015 0%, #131923 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      width: min(1200px, calc(100% - 32px));
      margin: 24px auto;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
    }

    .panel {
      background: rgba(26,31,41,0.9);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .controls {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-self: start;
      position: sticky;
      top: 20px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.3;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      margin-top: -8px;
    }

    .group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.04);
    }

    .group h2 {
      margin: 0 0 4px;
      font-size: 14px;
      color: #ffffff;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    input[type="file"] {
      width: 100%;
      color: var(--muted);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .primary {
      background: var(--accent);
      color: #081120;
      flex: 1;
    }

    .secondary {
      background: #30394a;
      color: #fff;
      flex: 1;
    }

    .preview {
      padding: 20px;
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .canvas-wrap {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      display: grid;
      place-items: center;
      min-height: 520px;
    }

    canvas {
      width: min(100%, 760px);
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.38);
      background: #0e1117;
    }

    .note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      padding: 0 4px;
    }

    .mini {
      font-size: 12px;
      color: #dfe6f5;
      opacity: 0.8;
    }

    @media (max-width: 900px) {
      .wrap {
        grid-template-columns: 1fr;
      }

      .controls {
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel controls">
      <h1>16:9 → 1:1<br>ぼかし背景加工ツール</h1>
      <p class="sub">
        画像を中央に配置し、背面には拡大＋ぼかしした同じ画像を敷いて、
        正方形のSNS向け画像を作成します。
      </p>

      <div class="group">
        <h2>画像</h2>
        <input id="fileInput" type="file" accept="image/*">
        <div class="row">
          <button id="sampleBtn" class="secondary">サンプル表示</button>
          <button id="downloadBtn" class="primary">PNGを書き出し</button>
        </div>
      </div>

      <div class="group">
        <h2>中央画像</h2>
        <label>拡大率 <span id="mainScaleVal">1.00</span></label>
        <input id="mainScale" type="range" min="0.6" max="1.8" step="0.01" value="1">

        <label>横位置 <span id="offsetXVal">0</span></label>
        <input id="offsetX" type="range" min="-300" max="300" step="1" value="0">

        <label>縦位置 <span id="offsetYVal">0</span></label>
        <input id="offsetY" type="range" min="-300" max="300" step="1" value="0">
      </div>

      <div class="group">
        <h2>背景ぼかし</h2>
        <label>背景拡大率 <span id="bgScaleVal">1.45</span></label>
        <input id="bgScale" type="range" min="1" max="3" step="0.01" value="1.45">

        <label>ぼかし量 <span id="blurVal">28</span></label>
        <input id="blur" type="range" min="0" max="80" step="1" value="28">

        <label>暗さ <span id="dimVal">0.12</span></label>
        <input id="dim" type="range" min="0" max="0.6" step="0.01" value="0.12">
      </div>

      <div class="group">
        <h2>余白と角丸</h2>
        <label>余白 <span id="paddingVal">0</span></label>
        <input id="padding" type="range" min="0" max="120" step="1" value="0">

        <label>角丸 <span id="radiusVal">0</span></label>
        <input id="radius" type="range" min="0" max="80" step="1" value="0">
      </div>

      <div class="mini">推奨: 16:9画像を読み込み → 背景拡大率とぼかし量を調整 → PNG保存</div>
    </section>

    <section class="panel preview">
      <div class="canvas-wrap">
        <canvas id="canvas" width="1080" height="1080"></canvas>
      </div>
      <div class="note">
        仕組みはシンプルで、同じ画像を2回描画しています。<br>
        1回目は正方形全面に「拡大＋ぼかし」で背景として描画。<br>
        2回目は中央に通常画像として重ねる構成です。
      </div>
    </section>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const els = {
      fileInput: document.getElementById('fileInput'),
      sampleBtn: document.getElementById('sampleBtn'),
      downloadBtn: document.getElementById('downloadBtn'),
      mainScale: document.getElementById('mainScale'),
      offsetX: document.getElementById('offsetX'),
      offsetY: document.getElementById('offsetY'),
      bgScale: document.getElementById('bgScale'),
      blur: document.getElementById('blur'),
      dim: document.getElementById('dim'),
      padding: document.getElementById('padding'),
      radius: document.getElementById('radius'),
      mainScaleVal: document.getElementById('mainScaleVal'),
      offsetXVal: document.getElementById('offsetXVal'),
      offsetYVal: document.getElementById('offsetYVal'),
      bgScaleVal: document.getElementById('bgScaleVal'),
      blurVal: document.getElementById('blurVal'),
      dimVal: document.getElementById('dimVal'),
      paddingVal: document.getElementById('paddingVal'),
      radiusVal: document.getElementById('radiusVal')
    };

    let image = null;

    function updateLabels() {
      els.mainScaleVal.textContent = Number(els.mainScale.value).toFixed(2);
      els.offsetXVal.textContent = els.offsetX.value;
      els.offsetYVal.textContent = els.offsetY.value;
      els.bgScaleVal.textContent = Number(els.bgScale.value).toFixed(2);
      els.blurVal.textContent = els.blur.value;
      els.dimVal.textContent = Number(els.dim.value).toFixed(2);
      els.paddingVal.textContent = els.padding.value;
      els.radiusVal.textContent = els.radius.value;
    }

    function roundedRectPath(context, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      context.beginPath();
      context.moveTo(x + rr, y);
      context.arcTo(x + w, y, x + w, y + h, rr);
      context.arcTo(x + w, y + h, x, y + h, rr);
      context.arcTo(x, y + h, x, y, rr);
      context.arcTo(x, y, x + w, y, rr);
      context.closePath();
    }

    function drawImageCover(context, img, dx, dy, dw, dh) {
      const ir = img.width / img.height;
      const tr = dw / dh;
      let sx, sy, sw, sh;

      if (ir > tr) {
        sh = img.height;
        sw = sh * tr;
        sx = (img.width - sw) / 2;
        sy = 0;
      } else {
        sw = img.width;
        sh = sw / tr;
        sx = 0;
        sy = (img.height - sh) / 2;
      }

      context.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
    }

    function render() {
      updateLabels();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0d1015';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (!image) {
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.font = 'bold 42px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('画像を読み込んでください', canvas.width / 2, canvas.height / 2 - 10);
        ctx.font = '24px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.fillText('16:9画像 → 正方形加工', canvas.width / 2, canvas.height / 2 + 40);
        return;
      }

      const mainScale = Number(els.mainScale.value);
      const offsetX = Number(els.offsetX.value);
      const offsetY = Number(els.offsetY.value);
      const bgScale = Number(els.bgScale.value);
      const blur = Number(els.blur.value);
      const dim = Number(els.dim.value);
      const padding = Number(els.padding.value);
      const radius = Number(els.radius.value);

      // 背景描画
      ctx.save();
      ctx.filter = `blur(${blur}px)`;
      const bgW = canvas.width * bgScale;
      const bgH = canvas.height * bgScale;
      const bgX = (canvas.width - bgW) / 2 + offsetX * 0.35;
      const bgY = (canvas.height - bgH) / 2 + offsetY * 0.35;
      drawImageCover(ctx, image, bgX, bgY, bgW, bgH);
      ctx.restore();

      if (dim > 0) {
        ctx.fillStyle = `rgba(0,0,0,${dim})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      // 中央画像描画
      const targetW = canvas.width - padding * 2;
      const targetH = targetW * (9 / 16);
      const drawW = targetW * mainScale;
      const drawH = targetH * mainScale;
      const x = (canvas.width - drawW) / 2 + offsetX;
      const y = (canvas.height - drawH) / 2 + offsetY;

      ctx.save();
      if (radius > 0) {
        roundedRectPath(ctx, x, y, drawW, drawH, radius);
        ctx.clip();
      }
      drawImageCover(ctx, image, x, y, drawW, drawH);
      ctx.restore();
    }

    function loadImageFromURL(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = url;
      });
    }

    els.fileInput.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          image = await loadImageFromURL(reader.result);
          render();
        } catch (err) {
          alert('画像の読み込みに失敗しました。');
        }
      };
      reader.readAsDataURL(file);
    });

    els.sampleBtn.addEventListener('click', async () => {
      try {
        image = await loadImageFromURL('./DesktopWorld_sq.png');
        render();
      } catch (err) {
        alert('サンプル画像が見つかりませんでした。HTMLと同じ場所に画像を置いてください。');
      }
    });

    els.downloadBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = 'square_blur_output.png';
      link.click();
    });

    [
      els.mainScale,
      els.offsetX,
      els.offsetY,
      els.bgScale,
      els.blur,
      els.dim,
      els.padding,
      els.radius
    ].forEach(el => el.addEventListener('input', render));

    render();
  </script>
</body>
</html>
